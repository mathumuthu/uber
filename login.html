<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Ride App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f5f5f5;
font-family: Arial;
}

/* Card animation */

.card{
animation: slideUp 0.7s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Shake animation */

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

</style>
</head>


<body class="flex items-center justify-center min-h-screen">


<div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md card">

<h2 class="text-3xl font-bold text-center mb-6 text-black">
Login
</h2>


<p id="errorMsg" class="text-red-500 text-center mb-4 hidden">
Please fill all fields
</p>


<form id="loginForm">

<div class="mb-4">

<label class="block text-gray-600 mb-2">
Email
</label>

<input 
id="email"
type="email"
placeholder="Enter email"
class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">

</div>



<div class="mb-4">

<label class="block text-gray-600 mb-2">
Password
</label>

<input 
id="password"
type="password"
placeholder="Enter password"
class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">

</div>


<div class="flex justify-between text-sm mb-5">

<label>
<input type="checkbox"> Remember me
</label>

<a href="for.html" class="text-yellow-500 font-semibold">
Forgot Password?
</a>

</div>


<button 
type="submit"
class="w-full bg-yellow-400 text-black font-bold py-3 rounded-lg hover:bg-yellow-500 transition">

Login

</button>


<p class="text-center mt-6 text-sm">

Don't have account?

<a href="sig.html" class="font-bold text-yellow-500">
Sign Up
</a>

</p>

</form>

</div>


<script>

const form = document.getElementById("loginForm")

form.addEventListener("submit",function(e){

e.preventDefault()

const email=document.getElementById("email")
const password=document.getElementById("password")
const error=document.getElementById("errorMsg")

if(email.value==="" || password.value===""){

error.classList.remove("hidden")

email.classList.add("shake")
password.classList.add("shake")

setTimeout(()=>{
email.classList.remove("shake")
password.classList.remove("shake")
},300)

}else{

error.classList.add("hidden")

alert("Login Successful!")

}

})

</script>


</body>
</html>
