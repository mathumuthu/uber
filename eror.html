<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 Page Not Found</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: linear-gradient(135deg,#6366f1,#1e293b);
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center text-white px-6">

<div class="max-w-6xl w-full grid md:grid-cols-2 gap-10 items-center">

<!-- Left Content -->
<div class="text-center md:text-left">

<h1 class="text-7xl md:text-8xl font-bold mb-4">
404
</h1>

<h2 class="text-2xl md:text-3xl font-semibold mb-3">
Oops! Page not found
</h2>

<p class="text-gray-200 mb-6">
The page you are looking for might have been removed, renamed,
or temporarily unavailable.
</p>

<!-- Search -->
<input type="text"
placeholder="Search website..."
class="w-full md:w-80 px-4 py-3 rounded-lg text-black mb-6">

<!-- Buttons -->
<div class="flex flex-wrap gap-4 justify-center md:justify-start">

<!-- <a href="index.html"
class="bg-white text-black px-6 py-3 rounded-lg font-semibold hover:bg-gray-200 transition">
Go Home
</a> -->

<a href="home.html"
class="border border-white px-6 py-3 rounded-lg hover:bg-white hover:text-black transition">
Next Page
</a>

</div>

</div>

<!-- Right Illustration -->
<div class="flex justify-center">

<img 
src="https://cdn-icons-png.flaticon.com/512/2748/2748558.png"
class="w-80 animate-bounce"
alt="404 image">

</div>

</div>

</body>
</html>
