<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - Ride App</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f5f5f5;
font-family: Arial;
}

/* Card animation */

.card{
animation: slideUp 0.7s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Shake animation */

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

</style>
</head>


<body class="flex items-center justify-center min-h-screen">


<div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md card">

<h2 class="text-3xl font-bold text-center mb-6 text-black">
Create Account
</h2>


<p id="errorMsg" class="text-red-500 text-center mb-4 hidden">
Please fill all fields
</p>

<p id="passError" class="text-red-500 text-center mb-4 hidden">
Passwords do not match
</p>


<form id="signupForm">


<div class="mb-4">

<input 
id="name"
type="text"
placeholder="Full Name"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400">

</div>



<div class="mb-4">

<input 
id="email"
type="email"
placeholder="Email Address"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400">

</div>



<div class="mb-4">

<input 
id="password"
type="password"
placeholder="Password"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400">

</div>



<div class="mb-4">

<input 
id="confirmPassword"
type="password"
placeholder="Confirm Password"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-yellow-400">

</div>


<button 
type="submit"
class="w-full bg-yellow-400 text-black font-bold py-3 rounded-lg hover:bg-yellow-500 transition">

Sign Up

</button>


<p class="text-center mt-6 text-sm">

Already have an account?

<a href="login.html" class="font-bold text-yellow-500">
Login
</a>

</p>

</form>

</div>


<script>

const form=document.getElementById("signupForm")

form.addEventListener("submit",function(e){

e.preventDefault()

const name=document.getElementById("name")
const email=document.getElementById("email")
const password=document.getElementById("password")
const confirm=document.getElementById("confirmPassword")

const error=document.getElementById("errorMsg")
const passError=document.getElementById("passError")


if(name.value==="" || email.value==="" || password.value==="" || confirm.value===""){

error.classList.remove("hidden")

name.classList.add("shake")
email.classList.add("shake")
password.classList.add("shake")
confirm.classList.add("shake")

setTimeout(()=>{
name.classList.remove("shake")
email.classList.remove("shake")
password.classList.remove("shake")
confirm.classList.remove("shake")
},300)

return

}


if(password.value !== confirm.value){

passError.classList.remove("hidden")

password.classList.add("shake")
confirm.classList.add("shake")

setTimeout(()=>{
password.classList.remove("shake")
confirm.classList.remove("shake")
},300)

return

}

error.classList.add("hidden")
passError.classList.add("hidden")

alert("Account Created Successfully!")

})

</script>

</body>
</html>
