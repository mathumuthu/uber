<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f5f5f5;
font-family: Arial;
}

/* Card animation */

.card{
animation: slideUp 0.7s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Shake animation */

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

/* Success animation */

.success{
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md card">

<h2 class="text-3xl font-bold text-center mb-6">
Reset Password
</h2>

<p class="text-gray-500 text-center mb-6">
Enter your email to receive reset instructions
</p>

<p id="errorMsg" class="text-red-500 text-center mb-4 hidden">
Please enter your email
</p>

<p id="successMsg" class="text-green-500 text-center mb-4 hidden success">
Reset link sent to your email
</p>

<form id="forgotForm">

<input
id="email"
type="email"
placeholder="Enter your email"
class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-yellow-400">

<button
type="submit"
class="w-full bg-yellow-400 text-black font-bold py-3 rounded-lg hover:bg-yellow-500 transition">

Send Reset Link

</button>

<p class="text-center mt-6 text-sm">

Remember your password?

<a href="login.html" class="font-bold text-yellow-500">
Login
</a>

</p>

</form>

</div>


<script>

const form=document.getElementById("forgotForm")

form.addEventListener("submit",function(e){

e.preventDefault()

const email=document.getElementById("email")
const error=document.getElementById("errorMsg")
const success=document.getElementById("successMsg")

if(email.value===""){

error.classList.remove("hidden")

email.classList.add("shake")

setTimeout(()=>{
email.classList.remove("shake")
},300)

return

}

error.classList.add("hidden")
success.classList.remove("hidden")

})

</script>

</body>
</html>
